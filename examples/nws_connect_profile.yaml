name: nws_connect
title: NWS Connect Service Profile
version: "1.0"
server_url: https://edr-api-desi-c.mdl.nws.noaa.gov/nws_connect_pygeoapi

collections:
  - id: water_gauge
    title: Water Gauge Data
    description: Real-time GeoJSON notification messages for water gauge observations including flood stage information
    keywords:
      - water
      - gauge
      - notification
      - flood
      - USGS
      - real-time
    links:
      - href: https://edr-api-desi-c.mdl.nws.noaa.gov/nws_connect_pygeoapi/collections/water_gauge
        rel: self
        type: application/json
      - href: https://www.weather.gov/disclaimer
        rel: terms-of-use
        type: text/html
        title: Terms of Use
    extent:
      spatial:
        bbox:
          - [-180, -90, 180, 90]
        crs: "http://www.opengis.net/def/crs/OGC/1.3/CRS84"
      temporal:
        interval:
          - ["2024-01-01T00:00:00Z", "2025-12-31T23:59:59Z"]
        values:
          - "2024-01-01T00:00:00Z/2025-12-31T23:59:59Z"
        trs: "http://www.opengis.net/def/uom/ISO-8601/0/Gregorian"
    parameter_names:
      flood_stage:
        type: Parameter
        id: flood_stage
        description: Flood stage classification (major, moderate, minor, action, below_action, unknown)
        observedProperty:
          id: flood_stage
          label: Flood Stage
        unit:
          label: category
          symbol: category
      feet_above_stage:
        type: Parameter
        id: feet_above_stage
        description: Feet of observation above the observed flood stage
        observedProperty:
          id: feet_above_stage
          label: Feet Above Stage
        unit:
          label: feet
          symbol: ft
      value:
        type: Parameter
        id: value
        description: Water gauge observation value
        observedProperty:
          id: gauge_height
          label: Gauge Height
        unit:
          label: feet
          symbol: ft

  - id: wwa
    title: Weather Watches and Warnings
    description: NWS Weather Watches and Warnings from CAP (Common Alerting Protocol) alerts
    keywords:
      - weather
      - warnings
      - watches
      - alerts
      - CAP
      - real-time
    links:
      - href: https://edr-api-desi-c.mdl.nws.noaa.gov/nws_connect_pygeoapi/collections/wwa
        rel: self
        type: application/json
      - href: https://www.weather.gov/disclaimer
        rel: terms-of-use
        type: text/html
        title: Terms of Use
    extent:
      spatial:
        bbox:
          - [-180, -90, 180, 90]
        crs: "http://www.opengis.net/def/crs/OGC/1.3/CRS84"
      temporal:
        interval:
          - ["2024-01-01T00:00:00Z", "2025-12-31T23:59:59Z"]
        values:
          - "2024-01-01T00:00:00Z/2025-12-31T23:59:59Z"
        trs: "http://www.opengis.net/def/uom/ISO-8601/0/Gregorian"
    parameter_names:
      CAP_info_event:
        type: Parameter
        id: CAP_info_event
        description: Event type (e.g., Tornado Warning, Flood Watch)
        observedProperty:
          id: event_type
          label: Event Type
        unit:
          label: category
          symbol: category
      CAP_info_severity:
        type: Parameter
        id: CAP_info_severity
        description: Severity level (Extreme, Severe, Moderate, Minor, Unknown)
        observedProperty:
          id: severity
          label: Severity
        unit:
          label: category
          symbol: category
      CAP_info_urgency:
        type: Parameter
        id: CAP_info_urgency
        description: Urgency level (Immediate, Expected, Future, Past, Unknown)
        observedProperty:
          id: urgency
          label: Urgency
        unit:
          label: category
          symbol: category
      CAP_status:
        type: Parameter
        id: CAP_status
        description: Alert status (Actual, Exercise, System, Test, Draft)
        observedProperty:
          id: status
          label: Status
        unit:
          label: category
          symbol: category

  - id: cwa
    title: NWS County Warning Areas
    description: Geographic boundaries of NWS County Warning Areas (CWA) in WKT format
    keywords:
      - NWS
      - CWA
      - boundaries
      - geographic
    links:
      - href: https://edr-api-desi-c.mdl.nws.noaa.gov/nws_connect_pygeoapi/collections/cwa
        rel: self
        type: application/json
      - href: https://www.weather.gov/disclaimer
        rel: terms-of-use
        type: text/html
        title: Terms of Use
    extent:
      spatial:
        bbox:
          - [-180, -90, 180, 90]
        crs: "http://www.opengis.net/def/crs/OGC/1.3/CRS84"
      temporal:
        interval:
          - ["2024-01-01T00:00:00Z", "2025-12-31T23:59:59Z"]
        values:
          - "2024-01-01T00:00:00Z/2025-12-31T23:59:59Z"
        trs: "http://www.opengis.net/def/uom/ISO-8601/0/Gregorian"
    parameter_names: {}

  - id: states
    title: States
    description: Geographic boundaries of states within the United States
    keywords:
      - NWS
      - states
      - boundaries
      - geographic
    links:
      - href: https://edr-api-desi-c.mdl.nws.noaa.gov/nws_connect_pygeoapi/collections/states
        rel: self
        type: application/json
      - href: https://www.weather.gov/disclaimer
        rel: terms-of-use
        type: text/html
        title: Terms of Use
    extent:
      spatial:
        bbox:
          - [-180, -90, 180, 90]
        crs: "http://www.opengis.net/def/crs/OGC/1.3/CRS84"
      temporal:
        interval:
          - ["2024-01-01T00:00:00Z", "2025-12-31T23:59:59Z"]
        values:
          - "2024-01-01T00:00:00Z/2025-12-31T23:59:59Z"
        trs: "http://www.opengis.net/def/uom/ISO-8601/0/Gregorian"
    parameter_names: {}

pubsub:
  broker_host: edr-api-desi-c.mdl.nws.noaa.gov
  broker_port: 5672
  protocol: amqp
  collections:
    - water_gauge
    - wwa
  servers:
    - name: amqp_websocket_local
      description: AMQP WebSocket endpoint (local development)
      host: 205.156.8.80
      port: 15670
      protocol: ws
    - name: amqp_websocket_secure
      description: AMQP WebSocket endpoint (production)
      host: edr-api-c.mdl.nws.noaa.gov
      protocol: wss
      pathname: /wifs_wss/
  collection_filters:
    water_gauge:
      filters:
        - name: flood_stages
          description: Alert for selected flood stages (below_action, action, minor, moderate, major)
          type: array
        - name: stations
          description: Comma-separated station IDs or 'all' for all stations
          type: string
        - name: wfo
          description: Weather Forecast Office codes (e.g., PHI, AKQ, OKX)
          type: string
        - name: email
          description: Email address for notifications
          type: string
    wwa:
      filters:
        - name: event_types
          description: Weather event types to subscribe to (e.g., Tornado Warning, Flood Watch)
          type: array
        - name: state
          description: Filter by state, or leave blank for all states
          type: string
        - name: cwa
          description: Filter by County Warning Area code
          type: string
        - name: email
          description: Email address for notifications
          type: string

# OGC API - EDR Part 3 compliance fields
required_conformance_classes:
  - "http://www.opengis.net/spec/ogcapi-edr-1/1.0/conf/core"
  - "http://www.opengis.net/spec/ogcapi-edr-2/1.0/conf/pubsub"

extent_requirements:
  minimum_bbox: [-180, -90, 180, 90]
  allowed_crs:
    - "http://www.opengis.net/def/crs/OGC/1.3/CRS84"
  allowed_trs:
    - "http://www.opengis.net/def/uom/ISO-8601/0/Gregorian"

output_formats:
  - name: GeoJSON
    media_type: application/geo+json
    schema_ref: https://geojson.org/schema/FeatureCollection.json

requirements:
  - id: conformance
    statement: The service SHALL declare conformance to OGC API - EDR Part 1 Core and Part 2 PubSub.
    parts:
      - The service SHALL provide a /conformance endpoint.
      - The response SHALL include http://www.opengis.net/spec/ogcapi-edr-1/1.0/conf/core.
      - The response SHALL include http://www.opengis.net/spec/ogcapi-edr-2/1.0/conf/pubsub.

  - id: collections-endpoint
    statement: The service SHALL provide a /collections endpoint listing all four collections.
    parts:
      - The service SHALL provide a /collections endpoint.
      - The response SHALL include water_gauge, wwa, cwa, and states collections.
      - Each collection SHALL have id, title, description, extent, and links properties.

  - id: water-gauge-collection
    statement: The water_gauge collection SHALL provide GeoJSON features with flood stage information.
    parts:
      - The service SHALL provide a /collections/water_gauge endpoint.
      - The service SHALL provide a /collections/water_gauge/items endpoint.
      - The response Content-Type SHALL be application/geo+json.
      - Each feature SHALL include flood_stage, feet_above_stage, and value properties.
      - Each feature geometry SHALL be a GeoJSON Point.

  - id: wwa-collection
    statement: The wwa collection SHALL provide GeoJSON features for weather watches and warnings.
    parts:
      - The service SHALL provide a /collections/wwa endpoint.
      - The service SHALL provide a /collections/wwa/items endpoint.
      - The response Content-Type SHALL be application/geo+json.
      - Each feature SHALL include CAP_info_event, CAP_info_severity, CAP_info_urgency, and CAP_status properties.
      - Each feature geometry SHALL be a GeoJSON Polygon or MultiPolygon.

  - id: cwa-collection
    statement: The cwa collection SHALL provide GeoJSON features for NWS County Warning Areas.
    parts:
      - The service SHALL provide a /collections/cwa endpoint.
      - The service SHALL provide a /collections/cwa/items endpoint.
      - The response Content-Type SHALL be application/geo+json.
      - Each feature SHALL include a CWA identifier property.
      - Each feature geometry SHALL be a GeoJSON Polygon or MultiPolygon.

  - id: states-collection
    statement: The states collection SHALL provide GeoJSON features for US state boundaries.
    parts:
      - The service SHALL provide a /collections/states endpoint.
      - The service SHALL provide a /collections/states/items endpoint.
      - The response Content-Type SHALL be application/geo+json.
      - Each feature SHALL include a state identifier property.
      - Each feature geometry SHALL be a GeoJSON Polygon or MultiPolygon.

  - id: items-by-id
    statement: All collections SHALL support retrieval of individual features by ID.
    parts:
      - Each collection SHALL provide a /collections/{collectionId}/items/{featureId} endpoint.
      - The response SHALL return a single GeoJSON feature.
      - The response SHALL return 404 if the feature does not exist.

  - id: pubsub-amqp
    statement: The service SHALL support AMQP pub/sub for real-time notifications on water_gauge and wwa collections.
    parts:
      - The service SHALL provide an AMQP broker at edr-api-desi-c.mdl.nws.noaa.gov:5672.
      - Clients SHALL be able to subscribe to collections/water_gauge/items/# channel.
      - Clients SHALL be able to subscribe to collections/wwa/items/# channel.
      - Notifications SHALL be published as GeoJSON features.

  - id: pubsub-websocket
    statement: The service SHALL support WebSocket pub/sub endpoints for browser clients.
    parts:
      - The service SHALL provide a WebSocket endpoint at ws://205.156.8.80:15670 for local development.
      - The service SHALL provide a secure WebSocket endpoint at wss://edr-api-c.mdl.nws.noaa.gov/wifs_wss/ for production.
      - WebSocket connections SHALL support AMQP protocol over WebSocket.

  - id: pubsub-filters-water-gauge
    statement: The water_gauge collection pub/sub SHALL support filtering by flood stages, stations, and WFO.
    parts:
      - Subscriptions SHALL accept flood_stages filter (array of stage values).
      - Subscriptions SHALL accept stations filter (comma-separated station IDs or 'all').
      - Subscriptions SHALL accept wfo filter (Weather Forecast Office codes).
      - Subscriptions SHALL accept email filter for notification delivery.

  - id: pubsub-filters-wwa
    statement: The wwa collection pub/sub SHALL support filtering by event types, state, and CWA.
    parts:
      - Subscriptions SHALL accept event_types filter (array of weather event types).
      - Subscriptions SHALL accept state filter (state code or blank for all).
      - Subscriptions SHALL accept cwa filter (County Warning Area code).
      - Subscriptions SHALL accept email filter for notification delivery.

abstract_tests:
  - id: conformance
    requirement_id: conformance
    steps:
      - Send GET request to /conformance.
      - Verify response contains http://www.opengis.net/spec/ogcapi-edr-1/1.0/conf/core.
      - Verify response contains http://www.opengis.net/spec/ogcapi-edr-2/1.0/conf/pubsub.

  - id: collections-endpoint
    requirement_id: collections-endpoint
    steps:
      - Send GET request to /collections.
      - Verify response contains collections array.
      - Verify water_gauge, wwa, cwa, and states are present in the collections array.
      - Verify each collection has id, title, description, extent, and links.

  - id: water-gauge-collection
    requirement_id: water-gauge-collection
    steps:
      - Send GET request to /collections/water_gauge.
      - Verify response contains collection metadata.
      - Send GET request to /collections/water_gauge/items?limit=10.
      - Verify response Content-Type is application/geo+json.
      - Verify each feature contains flood_stage, feet_above_stage, and value properties.
      - Verify each feature geometry type is Point.

  - id: wwa-collection
    requirement_id: wwa-collection
    steps:
      - Send GET request to /collections/wwa.
      - Verify response contains collection metadata.
      - Send GET request to /collections/wwa/items?limit=10.
      - Verify response Content-Type is application/geo+json.
      - Verify each feature contains CAP_info_event, CAP_info_severity, CAP_info_urgency, and CAP_status properties.
      - Verify each feature geometry type is Polygon or MultiPolygon.

  - id: cwa-collection
    requirement_id: cwa-collection
    steps:
      - Send GET request to /collections/cwa.
      - Verify response contains collection metadata.
      - Send GET request to /collections/cwa/items?limit=10.
      - Verify response Content-Type is application/geo+json.
      - Verify each feature contains a CWA identifier.
      - Verify each feature geometry type is Polygon or MultiPolygon.

  - id: states-collection
    requirement_id: states-collection
    steps:
      - Send GET request to /collections/states.
      - Verify response contains collection metadata.
      - Send GET request to /collections/states/items?limit=10.
      - Verify response Content-Type is application/geo+json.
      - Verify each feature contains a state identifier.
      - Verify each feature geometry type is Polygon or MultiPolygon.

  - id: items-by-id
    requirement_id: items-by-id
    steps:
      - Send GET request to /collections/water_gauge/items?limit=1.
      - Extract the id of the first feature.
      - Send GET request to /collections/water_gauge/items/{featureId}.
      - Verify response is a single GeoJSON feature with matching id.
      - Send GET request to /collections/water_gauge/items/nonexistent.
      - Verify response status is 404.

  - id: pubsub-amqp
    requirement_id: pubsub-amqp
    steps:
      - Connect to AMQP broker at edr-api-desi-c.mdl.nws.noaa.gov:5672.
      - Subscribe to collections/water_gauge/items/# channel.
      - Verify notifications are received as GeoJSON features.
      - Subscribe to collections/wwa/items/# channel.
      - Verify notifications are received as GeoJSON features.

  - id: pubsub-websocket
    requirement_id: pubsub-websocket
    steps:
      - Connect to WebSocket endpoint at ws://205.156.8.80:15670.
      - Verify connection succeeds and supports AMQP over WebSocket.
      - Connect to secure WebSocket endpoint at wss://edr-api-c.mdl.nws.noaa.gov/wifs_wss/.
      - Verify connection succeeds and supports AMQP over WebSocket.

  - id: pubsub-filters-water-gauge
    requirement_id: pubsub-filters-water-gauge
    steps:
      - Subscribe to collections/water_gauge/items/# with flood_stages filter set to ["major", "moderate"].
      - Verify only notifications matching the specified flood stages are received.
      - Subscribe with stations filter set to specific station IDs.
      - Verify only notifications for those stations are received.
      - Subscribe with wfo filter set to a specific office code.
      - Verify only notifications for that WFO are received.

  - id: pubsub-filters-wwa
    requirement_id: pubsub-filters-wwa
    steps:
      - Subscribe to collections/wwa/items/# with event_types filter set to ["Tornado Warning"].
      - Verify only notifications matching the specified event types are received.
      - Subscribe with state filter set to a specific state code.
      - Verify only notifications for that state are received.
      - Subscribe with cwa filter set to a specific CWA code.
      - Verify only notifications for that CWA are received.

